name: Deploy Mahj Lounge

on:
  push:
    branches: [master]
    paths:
      - 'mahj-lounge/**'
      - '.github/workflows/deploy-mahj-lounge.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mahj-lounge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mahj-lounge/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: mahj-lounge/dist
