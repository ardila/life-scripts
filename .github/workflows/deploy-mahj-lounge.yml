name: Deploy Mahj Lounge

on:
  push:
    branches: [master]
    paths:
      - 'mahj-lounge/**'
      - '.github/workflows/deploy-mahj-lounge.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mahj-lounge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mahj-lounge/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
      # GitHub Pages for this repo serves the master branch root, so the
      # built site is committed there. The paths filter above keeps these
      # artifact commits from re-triggering this workflow.
      - name: Publish site to master root
        working-directory: .
        run: |
          rm -rf assets
          cp -r mahj-lounge/dist/* .
          touch .nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A index.html assets .nojekyll
          git commit -m "Publish Mahj Lounge site" || echo "Site unchanged"
          git push
